<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="docker-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2496ed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2496ed;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-gradient)"/>
  
  <!-- VS Code Extension UI -->
  <rect x="80" y="60" width="440" height="280" rx="8" fill="#1e1e1e" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Title bar -->
  <rect x="80" y="60" width="440" height="30" rx="8" fill="#2d2d30"/>
  <rect x="80" y="75" width="440" height="15" fill="#2d2d30"/>
  
  <!-- Extension icon and title -->
  <rect x="100" y="100" width="24" height="24" rx="4" fill="url(#docker-gradient)"/>
  <text x="135" y="117" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">Coolify Deployments</text>
  
  <!-- Deployment status cards -->
  <rect x="100" y="140" width="380" height="40" rx="6" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
  <circle cx="115" cy="160" r="4" fill="#22c55e"/>
  <text x="130" y="158" font-family="Monaco, monospace" font-size="11" fill="white">my-app-frontend</text>
  <text x="130" y="172" font-family="Monaco, monospace" font-size="9" fill="rgba(255,255,255,0.7)">✓ Deployed successfully</text>
  <text x="460" y="165" font-family="Monaco, monospace" font-size="10" fill="#22c55e" text-anchor="end">RUNNING</text>
  
  <rect x="100" y="190" width="380" height="40" rx="6" fill="rgba(251,191,36,0.2)" stroke="rgba(251,191,36,0.4)" stroke-width="1"/>
  <circle cx="115" cy="210" r="4" fill="#fbbf24"/>
  <text x="130" y="208" font-family="Monaco, monospace" font-size="11" fill="white">api-backend</text>
  <text x="130" y="222" font-family="Monaco, monospace" font-size="9" fill="rgba(255,255,255,0.7)">⚠ Building...</text>
  <text x="460" y="215" font-family="Monaco, monospace" font-size="10" fill="#fbbf24" text-anchor="end">BUILDING</text>
  
  <rect x="100" y="240" width="380" height="40" rx="6" fill="rgba(239,68,68,0.2)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <circle cx="115" cy="260" r="4" fill="#ef4444"/>
  <text x="130" y="258" font-family="Monaco, monospace" font-size="11" fill="white">database-service</text>
  <text x="130" y="272" font-family="Monaco, monospace" font-size="9" fill="rgba(255,255,255,0.7)">✗ Build failed</text>
  <text x="460" y="265" font-family="Monaco, monospace" font-size="10" fill="#ef4444" text-anchor="end">FAILED</text>
  
  <!-- Action buttons -->
  <rect x="100" y="300" width="80" height="25" rx="4" fill="rgba(59,130,246,0.3)" stroke="rgba(59,130,246,0.5)" stroke-width="1"/>
  <text x="140" y="316" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Deploy</text>
  
  <rect x="190" y="300" width="80" height="25" rx="4" fill="rgba(107,114,128,0.3)" stroke="rgba(107,114,128,0.5)" stroke-width="1"/>
  <text x="230" y="316" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Logs</text>
  
  <rect x="280" y="300" width="80" height="25" rx="4" fill="rgba(239,68,68,0.3)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="320" y="316" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Stop</text>
  
  <!-- Docker containers floating -->
  <rect x="30" y="120" width="30" height="20" rx="3" fill="rgba(36,150,237,0.3)" stroke="rgba(36,150,237,0.6)" stroke-width="1"/>
  <rect x="35" y="125" width="20" height="10" rx="2" fill="rgba(36,150,237,0.5)"/>
  
  <rect x="540" y="180" width="30" height="20" rx="3" fill="rgba(36,150,237,0.3)" stroke="rgba(36,150,237,0.6)" stroke-width="1"/>
  <rect x="545" y="185" width="20" height="10" rx="2" fill="rgba(36,150,237,0.5)"/>
  
  <!-- Connecting lines -->
  <line x1="60" y1="130" x2="100" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="540" y1="190" x2="480" y2="210" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Coolify logo placeholder -->
  <rect x="450" y="105" width="20" height="20" rx="3" fill="rgba(6,182,212,0.4)"/>
  <text x="460" y="119" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">C</text>
  
  <!-- Title -->
  <text x="300" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Coolify Extension</text>
</svg>
