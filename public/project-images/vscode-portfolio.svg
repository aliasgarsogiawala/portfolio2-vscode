<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-gradient)"/>
  
  <!-- VS Code window -->
  <rect x="50" y="50" width="500" height="300" rx="8" fill="#1e1e1e" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Title bar -->
  <rect x="50" y="50" width="500" height="30" rx="8" fill="#2d2d30"/>
  <rect x="50" y="65" width="500" height="15" fill="#2d2d30"/>
  
  <!-- Traffic lights -->
  <circle cx="70" cy="65" r="6" fill="#ff5f57"/>
  <circle cx="90" cy="65" r="6" fill="#ffbd2e"/>
  <circle cx="110" cy="65" r="6" fill="#28ca42"/>
  
  <!-- Tabs -->
  <rect x="150" y="80" width="80" height="25" fill="#37373d" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="230" y="80" width="80" height="25" fill="#1e1e1e"/>
  <rect x="310" y="80" width="80" height="25" fill="#1e1e1e"/>
  
  <!-- Tab text -->
  <text x="190" y="98" font-family="Monaco, monospace" font-size="10" fill="#fff">index.tsx</text>
  <text x="270" y="98" font-family="Monaco, monospace" font-size="10" fill="#888">about.tsx</text>
  <text x="350" y="98" font-family="Monaco, monospace" font-size="10" fill="#888">projects.tsx</text>
  
  <!-- Sidebar -->
  <rect x="50" y="105" width="60" height="245" fill="#252526"/>
  
  <!-- Sidebar icons -->
  <rect x="62" y="120" width="16" height="16" rx="2" fill="#007acc"/>
  <rect x="62" y="145" width="16" height="16" rx="2" fill="#444"/>
  <rect x="62" y="170" width="16" height="16" rx="2" fill="#444"/>
  <rect x="62" y="195" width="16" height="16" rx="2" fill="#444"/>
  
  <!-- File explorer -->
  <rect x="110" y="105" width="120" height="245" fill="#1e1e1e"/>
  <text x="120" y="125" font-family="Monaco, monospace" font-size="10" fill="#fff">EXPLORER</text>
  
  <!-- File tree -->
  <text x="125" y="145" font-family="Monaco, monospace" font-size="9" fill="#cccccc">📁 components</text>
  <text x="125" y="160" font-family="Monaco, monospace" font-size="9" fill="#cccccc">📁 pages</text>
  <text x="125" y="175" font-family="Monaco, monospace" font-size="9" fill="#cccccc">📁 styles</text>
  <text x="125" y="190" font-family="Monaco, monospace" font-size="9" fill="#569cd6">📄 package.json</text>
  <text x="125" y="205" font-family="Monaco, monospace" font-size="9" fill="#569cd6">📄 next.config.js</text>
  
  <!-- Main editor -->
  <rect x="230" y="105" width="320" height="245" fill="#1e1e1e"/>
  
  <!-- Code content -->
  <text x="240" y="125" font-family="Monaco, monospace" font-size="9" fill="#9cdcfe">import</text>
  <text x="280" y="125" font-family="Monaco, monospace" font-size="9" fill="#ce9178"> React </text>
  <text x="320" y="125" font-family="Monaco, monospace" font-size="9" fill="#9cdcfe">from</text>
  <text x="350" y="125" font-family="Monaco, monospace" font-size="9" fill="#ce9178"> 'react'</text>
  
  <text x="240" y="145" font-family="Monaco, monospace" font-size="9" fill="#c586c0">const</text>
  <text x="280" y="145" font-family="Monaco, monospace" font-size="9" fill="#dcdcaa"> Portfolio</text>
  <text x="340" y="145" font-family="Monaco, monospace" font-size="9" fill="#d4d4d4"> = () => {</text>
  
  <text x="250" y="165" font-family="Monaco, monospace" font-size="9" fill="#c586c0">return</text>
  <text x="290" y="165" font-family="Monaco, monospace" font-size="9" fill="#d4d4d4"> (</text>
  
  <text x="260" y="185" font-family="Monaco, monospace" font-size="9" fill="#808080">&lt;</text>
  <text x="270" y="185" font-family="Monaco, monospace" font-size="9" fill="#4ec9b0">div</text>
  <text x="290" y="185" font-family="Monaco, monospace" font-size="9" fill="#92c5f8"> className</text>
  <text x="350" y="185" font-family="Monaco, monospace" font-size="9" fill="#d4d4d4">=</text>
  <text x="360" y="185" font-family="Monaco, monospace" font-size="9" fill="#ce9178">"portfolio"</text>
  <text x="420" y="185" font-family="Monaco, monospace" font-size="9" fill="#808080">&gt;</text>
  
  <text x="270" y="205" font-family="Monaco, monospace" font-size="9" fill="#808080">&lt;</text>
  <text x="280" y="205" font-family="Monaco, monospace" font-size="9" fill="#4ec9b0">h1</text>
  <text x="295" y="205" font-family="Monaco, monospace" font-size="9" fill="#808080">&gt;</text>
  <text x="305" y="205" font-family="Monaco, monospace" font-size="9" fill="#d4d4d4">Welcome</text>
  <text x="355" y="205" font-family="Monaco, monospace" font-size="9" fill="#808080">&lt;/</text>
  <text x="375" y="205" font-family="Monaco, monospace" font-size="9" fill="#4ec9b0">h1</text>
  <text x="390" y="205" font-family="Monaco, monospace" font-size="9" fill="#808080">&gt;</text>
  
  <text x="260" y="225" font-family="Monaco, monospace" font-size="9" fill="#808080">&lt;/</text>
  <text x="275" y="225" font-family="Monaco, monospace" font-size="9" fill="#4ec9b0">div</text>
  <text x="295" y="225" font-family="Monaco, monospace" font-size="9" fill="#808080">&gt;</text>
  
  <text x="250" y="245" font-family="Monaco, monospace" font-size="9" fill="#d4d4d4"> )</text>
  <text x="240" y="265" font-family="Monaco, monospace" font-size="9" fill="#d4d4d4">}</text>
  
  <!-- Line numbers -->
  <rect x="230" y="105" width="20" height="245" fill="#1e1e1e"/>
  <text x="235" y="125" font-family="Monaco, monospace" font-size="8" fill="#858585">1</text>
  <text x="235" y="145" font-family="Monaco, monospace" font-size="8" fill="#858585">3</text>
  <text x="235" y="165" font-family="Monaco, monospace" font-size="8" fill="#858585">4</text>
  <text x="235" y="185" font-family="Monaco, monospace" font-size="8" fill="#858585">5</text>
  <text x="235" y="205" font-family="Monaco, monospace" font-size="8" fill="#858585">6</text>
  <text x="235" y="225" font-family="Monaco, monospace" font-size="8" fill="#858585">7</text>
  <text x="235" y="245" font-family="Monaco, monospace" font-size="8" fill="#858585">8</text>
  
  <!-- Status bar -->
  <rect x="50" y="350" width="500" height="20" fill="#007acc"/>
  <text x="60" y="363" font-family="Monaco, monospace" font-size="8" fill="#fff">TypeScript React</text>
  
  <!-- Title -->
  <text x="300" y="25" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">VS Code Portfolio</text>
</svg>
