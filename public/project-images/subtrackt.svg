<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-gradient)"/>
  
  <!-- Phone mockup -->
  <rect x="100" y="50" width="200" height="300" rx="20" fill="#1f1f1f" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <rect x="110" y="70" width="180" height="260" rx="10" fill="#000"/>
  
  <!-- Phone screen content -->
  <!-- Header -->
  <rect x="120" y="80" width="160" height="40" rx="8" fill="url(#card-gradient)"/>
  <text x="200" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Subtrackt</text>
  
  <!-- Subscription cards -->
  <rect x="125" y="135" width="150" height="35" rx="8" fill="rgba(236,72,153,0.3)" stroke="rgba(236,72,153,0.5)" stroke-width="1"/>
  <text x="135" y="150" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">Netflix</text>
  <text x="135" y="162" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">$15.99/month</text>
  <text x="265" y="157" font-family="Arial, sans-serif" font-size="12" fill="#ff4444" text-anchor="end">$15.99</text>
  
  <rect x="125" y="180" width="150" height="35" rx="8" fill="rgba(139,92,246,0.3)" stroke="rgba(139,92,246,0.5)" stroke-width="1"/>
  <text x="135" y="195" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">Spotify</text>
  <text x="135" y="207" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">$9.99/month</text>
  <text x="265" y="202" font-family="Arial, sans-serif" font-size="12" fill="#ff4444" text-anchor="end">$9.99</text>
  
  <rect x="125" y="225" width="150" height="35" rx="8" fill="rgba(34,197,94,0.3)" stroke="rgba(34,197,94,0.5)" stroke-width="1"/>
  <text x="135" y="240" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">Adobe CC</text>
  <text x="135" y="252" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">$20.99/month</text>
  <text x="265" y="247" font-family="Arial, sans-serif" font-size="12" fill="#ff4444" text-anchor="end">$20.99</text>
  
  <!-- Total -->
  <rect x="125" y="275" width="150" height="30" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="135" y="290" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">Monthly Total</text>
  <text x="265" y="295" font-family="Arial, sans-serif" font-size="14" fill="#00ff88" text-anchor="end" font-weight="bold">$46.97</text>
  
  <!-- Desktop view -->
  <rect x="320" y="80" width="240" height="160" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- Dashboard header -->
  <rect x="340" y="100" width="200" height="25" rx="4" fill="rgba(255,255,255,0.1)"/>
  <text x="440" y="117" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Dashboard</text>
  
  <!-- Chart area -->
  <rect x="340" y="135" width="80" height="50" rx="4" fill="rgba(236,72,153,0.2)"/>
  <rect x="340" y="160" width="60" height="25" fill="rgba(236,72,153,0.4)"/>
  
  <rect x="430" y="135" width="80" height="50" rx="4" fill="rgba(139,92,246,0.2)"/>
  <rect x="430" y="145" width="70" height="40" fill="rgba(139,92,246,0.4)"/>
  
  <!-- Stats -->
  <text x="350" y="205" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">12 Services</text>
  <text x="350" y="217" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">$563.64/year</text>
  
  <text x="440" y="205" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">Money Saved</text>
  <text x="440" y="217" font-family="Arial, sans-serif" font-size="8" fill="#00ff88">$127.43</text>
  
  <!-- Floating elements -->
  <circle cx="80" cy="100" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="520" cy="60" r="6" fill="rgba(255,255,255,0.2)"/>
  <circle cx="570" cy="120" r="5" fill="rgba(255,255,255,0.25)"/>
  
  <!-- Dollar signs -->
  <text x="70" y="350" font-family="Arial, sans-serif" font-size="40" fill="rgba(255,255,255,0.1)">$</text>
  <text x="520" y="340" font-family="Arial, sans-serif" font-size="30" fill="rgba(255,255,255,0.1)">$</text>
  
  <!-- Title -->
  <text x="300" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Subtrackt</text>
</svg>
